<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>skm 配置面板</title>
<style>
  :root {
    --bg:#14161a; --panel:#1c1f26; --panel2:#232733; --line:#2e333f;
    --text:#e6e9ef; --muted:#8b93a3; --accent:#5b9dff; --green:#3ad29f;
    --gold:#e0b341; --danger:#ff6b6b; --chip:#2b3040;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:14px/1.5 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
  header { padding:12px 20px; border-bottom:1px solid var(--line); display:flex;
    align-items:center; gap:12px; position:sticky; top:0; background:var(--bg); z-index:10; }
  header h1 { font-size:16px; margin:0; }
  .spacer { flex:1; }
  button { font:inherit; cursor:pointer; border:1px solid var(--line);
    background:var(--panel2); color:var(--text); border-radius:6px; padding:6px 12px; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#06101f; font-weight:600; }
  button.mini { padding:1px 7px; font-size:12px; }
  main { display:grid; grid-template-columns:28% 1fr 1fr; gap:16px; padding:16px 20px; align-items:start; }
  .col-title { font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.05em; margin:0 0 8px; }
  #search { width:100%; padding:8px 10px; margin-bottom:10px; background:var(--panel);
    border:1px solid var(--line); border-radius:6px; color:var(--text); }
  .pool { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px; max-height:78vh; overflow:auto; position:sticky; top:70px; }
  .skill { padding:7px 9px; border-radius:6px; cursor:grab; border:1px solid transparent; }
  .skill:hover { background:var(--panel2); border-color:var(--line); }
  .skill .name { font-weight:600; }
  .skill .desc { color:var(--muted); font-size:12px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; }
  .sec { margin-bottom:20px; }
  .bucket { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:11px 12px; margin-bottom:10px; }
  .bucket.drag { border-color:var(--accent); background:#1a2130; }
  .bucket.uni { border-color:var(--green); }
  .bucket.tool { border-color:var(--gold); }
  .bhead { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .bhead .id { font-weight:700; }
  .bhead input { background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:5px; padding:2px 6px; font-size:12px; width:80px; }
  .count { color:var(--muted); font-size:12px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; min-height:28px; }
  .chip { background:var(--chip); border:1px solid var(--line); border-radius:20px;
    padding:3px 8px 3px 10px; font-size:12px; display:inline-flex; align-items:center; gap:6px; }
  .chip.pack { border-color:var(--accent); color:var(--accent); }
  .chip .x { cursor:pointer; color:var(--muted); font-weight:700; }
  .chip .x:hover { color:var(--danger); }
  .empty { color:var(--muted); font-size:12px; font-style:italic; }
  .grpsel { display:flex; flex-wrap:wrap; gap:10px; margin:2px 0 4px; }
  .grpsel label { font-size:12px; display:inline-flex; align-items:center; gap:4px; cursor:pointer; }
  .sublab { font-size:11px; color:var(--muted); margin:9px 0 3px; letter-spacing:.03em; }
  .sublab.g { color:var(--accent); } .sublab.s { color:var(--gold); }
  .divider { border-top:1px dashed var(--line); margin:8px 0 0; }
  .eff { color:var(--green); font-size:12px; }
  #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 18px;
    border-radius:8px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:20; }
  #toast.show { opacity:1; } #toast.ok { background:var(--green); color:#052018; }
  #toast.err { background:var(--danger); color:#2a0808; }
</style>
</head>
<body>
<header>
  <h1>🧩 skm 配置面板</h1>
  <span class="count" id="hint"></span>
  <div class="spacer"></div>
  <button id="addgrp">+ 新建分组</button>
  <button class="primary" id="save">保存并应用</button>
</header>
<main>
  <section>
    <p class="col-title">Skill 池(拖到右边任意桶)</p>
    <input id="search" placeholder="搜索 skill 名 / 描述…">
    <div class="pool" id="pool"></div>
  </section>
  <section>
    <div class="sec">
      <p class="col-title">① 通用层 — 所有工具常驻</p>
      <div id="universal"></div>
    </div>
    <div class="sec">
      <p class="col-title">② 分组 — 命名 skill 集,工具可多选</p>
      <div id="groups"></div>
    </div>
  </section>
  <section>
    <div class="sec">
      <p class="col-title">③ 工具 — 专用层 + 勾选启用哪些分组</p>
      <div id="tools"></div>
    </div>
  </section>
</main>
<div id="toast"></div>
<script>
let S = null, model = null;

async function load() {
  S = await (await fetch("/api/state")).json();
  model = { universal:[...S.universal], groups:{}, tools:{} };
  for (const [id,g] of Object.entries(S.groups))
    model.groups[id] = { label:g.label||"", skills:[...g.skills], packs:[...g.packs] };
  for (const [t,tc] of Object.entries(S.tools))
    model.tools[t] = { skills:[...tc.skills], groups:[...tc.groups] };
  document.getElementById("hint").textContent = `中央仓 ${S.skills.length} 个 skill`;
  renderPool(); renderAll();
}

function renderPool() {
  const q = (document.getElementById("search").value||"").toLowerCase();
  const pool = document.getElementById("pool"); pool.innerHTML = "";
  for (const s of S.skills) {
    if (q && !(s.name.toLowerCase().includes(q) || (s.description||"").toLowerCase().includes(q))) continue;
    const d = document.createElement("div");
    d.className = "skill"; d.draggable = true;
    d.innerHTML = `<div class="name">${s.name}</div><div class="desc">${s.description||""}</div>`;
    d.addEventListener("dragstart", e =>
      e.dataTransfer.setData("text/plain", JSON.stringify({kind:"skill", name:s.name})));
    pool.appendChild(d);
  }
}

function chip(name, onRemove, isPack) {
  const c = document.createElement("span");
  c.className = "chip" + (isPack?" pack":"");
  c.innerHTML = `${isPack?"📦 ":""}${name} <span class="x">✕</span>`;
  c.querySelector(".x").addEventListener("click", onRemove);
  return c;
}

function dropzone(el, arr, kind) {
  el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag"); });
  el.addEventListener("dragleave", () => el.classList.remove("drag"));
  el.addEventListener("drop", e => {
    e.preventDefault(); el.classList.remove("drag");
    const it = JSON.parse(e.dataTransfer.getData("text/plain"));
    if (it.kind !== kind) return;
    if (!arr.includes(it.name)) arr.push(it.name);
    renderAll();
  });
}

function chipsInto(box, skills, packs, onDelSkill, onDelPack) {
  box.className = "chips";
  if (!skills.length && !(packs||[]).length) box.innerHTML = '<span class="empty">拖 skill 到这里</span>';
  (packs||[]).forEach(p => box.appendChild(chip(p, () => onDelPack(p), true)));
  skills.forEach(s => box.appendChild(chip(s, () => onDelSkill(s), false)));
}

function renderAll() {
  // ① universal
  const uni = document.getElementById("universal"); uni.innerHTML = "";
  const ub = document.createElement("div"); ub.className = "bucket uni";
  ub.innerHTML = `<div class="bhead"><span class="id">通用层</span><span class="count">${model.universal.length} 个</span></div>`;
  const uchips = document.createElement("div");
  chipsInto(uchips, model.universal, [], s => { model.universal = model.universal.filter(x=>x!==s); renderAll(); }, ()=>{});
  ub.appendChild(uchips); dropzone(ub, model.universal, "skill"); uni.appendChild(ub);

  // ② groups
  const gel = document.getElementById("groups"); gel.innerHTML = "";
  for (const id of Object.keys(model.groups).sort()) {
    const g = model.groups[id];
    const b = document.createElement("div"); b.className = "bucket";
    const head = document.createElement("div"); head.className = "bhead";
    head.innerHTML = `<span class="id">📁 ${id}</span>`;
    const lbl = document.createElement("input"); lbl.placeholder="中文名"; lbl.value=g.label;
    lbl.addEventListener("input", ()=>g.label=lbl.value); head.appendChild(lbl);
    const del = document.createElement("button"); del.className="mini"; del.textContent="删除";
    del.addEventListener("click", ()=>{ delete model.groups[id];
      for (const t of Object.values(model.tools)) t.groups = t.groups.filter(x=>x!==id);
      renderAll(); });
    head.appendChild(del);
    const cnt = document.createElement("span"); cnt.className="count";
    cnt.textContent = `${g.skills.length+g.packs.length} 项`; head.appendChild(cnt);
    b.appendChild(head);
    const chips = document.createElement("div");
    chipsInto(chips, g.skills, g.packs,
      s => { g.skills = g.skills.filter(x=>x!==s); renderAll(); },
      p => { g.packs = g.packs.filter(x=>x!==p); renderAll(); });
    b.appendChild(chips); dropzone(b, g.skills, "skill"); gel.appendChild(b);
  }

  // ③ tools
  const tel = document.getElementById("tools"); tel.innerHTML = "";
  for (const t of Object.keys(model.tools).sort()) {
    const tc = model.tools[t];
    const b = document.createElement("div"); b.className = "bucket tool";
    const eff = effective(t);
    b.innerHTML = `<div class="bhead"><span class="id">🔧 ${t}</span>` +
      `<span class="eff">最终启用 ${eff} 个 skill</span></div>`;
    // —— 启用哪些分组(勾选,不影响别的工具)——
    const sl1 = document.createElement("div"); sl1.className = "sublab g";
    sl1.textContent = "启用分组(可多选,仅影响本工具)"; b.appendChild(sl1);
    const sel = document.createElement("div"); sel.className = "grpsel";
    for (const gid of Object.keys(model.groups).sort()) {
      const lab = document.createElement("label");
      const cb = document.createElement("input"); cb.type="checkbox";
      cb.checked = tc.groups.includes(gid);
      cb.addEventListener("change", () => {
        if (cb.checked) { if(!tc.groups.includes(gid)) tc.groups.push(gid); }
        else tc.groups = tc.groups.filter(x=>x!==gid);
        renderAll();
      });
      lab.appendChild(cb); lab.appendChild(document.createTextNode(gid)); sel.appendChild(lab);
    }
    if (!Object.keys(model.groups).length) sel.innerHTML = '<span class="empty">先在 ② 建分组</span>';
    b.appendChild(sel);
    // —— 本工具专用 skill(拖入,只给这个工具常驻)——
    const div = document.createElement("div"); div.className = "divider"; b.appendChild(div);
    const sl2 = document.createElement("div"); sl2.className = "sublab s";
    sl2.textContent = `专用 skill · 只给 ${t}、常驻(${tc.skills.length}) — 拖 skill 到下方`;
    b.appendChild(sl2);
    const chips = document.createElement("div");
    chipsInto(chips, tc.skills, [], s => { tc.skills = tc.skills.filter(x=>x!==s); renderAll(); }, ()=>{});
    b.appendChild(chips); dropzone(b, tc.skills, "skill"); tel.appendChild(b);
  }
}

function effective(t) {
  const tc = model.tools[t];
  const set = new Set(model.universal);
  tc.skills.forEach(s=>set.add(s));
  for (const gid of tc.groups) {
    const g = model.groups[gid]; if(!g) continue;
    g.skills.forEach(s=>set.add(s));
    g.packs.forEach(p => (S.packs[p]||[]).forEach(s=>set.add(s)));
  }
  return set.size;
}

document.getElementById("search").addEventListener("input", renderPool);
document.getElementById("addgrp").addEventListener("click", () => {
  const id = (prompt("分组 id(英文小写/数字/短横线):")||"").trim();
  if (!id) return;
  if (!/^[a-z0-9][a-z0-9-]*$/.test(id)) { toast("id 不合法", false); return; }
  if (model.groups[id]) { toast("已存在", false); return; }
  model.groups[id] = { label:"", skills:[], packs:[] }; renderAll();
});
document.getElementById("save").addEventListener("click", async () => {
  const payload = { universal:model.universal, tools:{}, groups:{} };
  for (const [id,g] of Object.entries(model.groups))
    payload.groups[id] = { label:g.label, skills:g.skills, packs:g.packs };
  for (const [t,tc] of Object.entries(model.tools))
    payload.tools[t] = { skills:tc.skills, groups:tc.groups };
  const r = await fetch("/api/save", { method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
  if (r.ok) { toast("已保存并应用 — 重启各工具会话生效", true); setTimeout(load, 600); }
  else { const e = await r.json(); toast("失败:"+(e.error||r.status), false); }
});

function toast(m, ok) {
  const t = document.getElementById("toast");
  t.textContent = m; t.className = "show "+(ok?"ok":"err");
  setTimeout(()=>t.className="", 4000);
}
load();
</script>
</body>
</html>
